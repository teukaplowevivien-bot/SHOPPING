<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script src="script.js"></script>
    <title>Panier</title>
   <style>
    *
    {
        font-family: 'Times New Roman', Times, serif;
        margin: 0;
        padding: 0;
        scroll-padding-top: 2rem;
        scroll-behavior: smooth;
        box-sizing: border-box;
        list-style: none;
        text-decoration: none;
    }

      img
        {
            width: 100%;

        }
       
    .add-cart
    {
        position: absolute;
        bottom: 0;
        right: 0;
        background: black;
        color: white;
        padding: 20px;
        cursor: pointer;
    }
      
    .add-cart:hover
    {
        background: hsl(249,32%,17%);
    }
    .cart
    {
        position: fixed;
        top: 0;
        right: -100%;
        width: 360px;
        min-height: 100vh;
        padding: 20px;
        background: white;
        box-shadow: -2px 0 4px hsl(0 4% 15% / 10%);
    }
    .cart-title
    {
        text-align: center;
        font-size: 1.5rem;
        font-weight: 600;
        margin-top: 2rem;
    }
    .cart-box
    {
       display: grid;
      grid-template-columns: 32% 50% 18%;
       align-items: center;
       gap: 1rem;
       margin-top: 1rem;

    }
    .cart-img
    {
        width: 100px;
        height: 100px;
        object-fit: contain;
        padding: 10px;
        border-radius: 2px;
    }
    .details-box
    {
        display: grid;
        row-gap: 0.5rem;
    }
    .cart-produit-title
    {
        font-size: 1.5rem;
        text-transform: uppercase;
       
    }
    .cart-price
    {
        font-weight: 500;
    }
    .cart-quantity
    {
        border: 1.5px solid rgb(161, 155, 155);
        outline-color: rgb(104, 99, 99);
        width: 2.4rem;
        text-align: center;
        font-size: 1rem;
    }
    .cart-remove
    {
        font-size: 24px;
        color: orange;
        cursor: pointer;
    }
    .total
    {
        display: flex;
        justify-content: flex-end;
        margin-top: 1.5rem;
        border-top: 1px solid black;
    }
    .total-title
    {
        font-size: 1rem;
        font-weight: 600;
    }
    .total-price
    {
        margin-left: 0.5rem;
    }

    .btn-buy
    {
        display: flex;
        margin: 1.5rem auto 0 auto ;
        padding: 12px 20px;
        border: none;
        background: red;
        color: rgb(250, 247, 247);
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
    }

    .btn-buy:hover
    {
        background: black;

    }

    #close-cart
    {
        position: absolute;
        top: 1rem;
        right: 0.8rem;
        font-size: 2rem;
        color: black;
        cursor: pointer;
    }















   </style>
</head>
<body>
   
<div class="cart">
    <h2 class="cart-title">  Ma Liste</h2>

 <div class="cart-content">
    <div class="cart-box">
         <img src="photos/IMG-20241029-WA0011.jpg" alt="">
      <div class="detail-box">
         <div class="cart-produit-title">Earbuds</div>
         <div class="cart-price">4000FCFA</div>
         <input type="number" value="1" class="cart-quantity">
      </div>
       <i class="bx bxs-trash-alt cart-remove">♣ </i>
    </div>
   
 </div>
   <div class="total">

       <div class="total-title">Total</div>
       <div class="total-price">0FCFA</div>

    </div>
    <button type="button" class="btn-buy">Buy Now</button> 
     <i class="bx bx-x id " id="close-cart">○</i>

</div>

<script>

</script>

</body>




</html>
